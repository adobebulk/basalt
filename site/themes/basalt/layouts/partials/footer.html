{{- $s := .Site.Data.settings -}}
<footer class="px-6 py-4 text-xs text-stone-400 border-t border-stone-200 flex items-center justify-between gap-4">
  <span>© {{ now.Year }} {{ $s.photographer | default .Site.Params.photographer }}</span>
  {{- with .Site.Data.version -}}
  <span class="text-xs opacity-40">v{{ .version }}</span>
  {{- end -}}
</footer>
