<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>{{ partial "head.html" . }}</head>
<body class="min-h-screen flex flex-col bg-stone-50 text-stone-900 font-sans">
  {{ partial "header.html" . }}

  <main class="flex-1 w-full max-w-2xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-bold tracking-tight">{{ .Title }}</h1>

    <ul class="mt-8 space-y-6">
      {{- range where .Pages "Params.draft" "ne" true -}}
      <li>
        <a href="{{ .RelPermalink }}" class="group block">
          <span class="text-sm font-semibold text-stone-800 group-hover:text-stone-900 transition-colors">{{ .Title }}</span>
          <span class="ml-3 text-xs text-stone-400 tabular-nums">{{ .Date.Format "Jan 2, 2006" }}</span>
          {{- with .Params.excerpt }}
          <p class="mt-1 text-xs text-stone-500 leading-relaxed">{{ . }}</p>
          {{- end }}
        </a>
      </li>
      {{- end -}}
    </ul>
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
