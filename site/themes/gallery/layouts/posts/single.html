<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>{{ partial "head.html" . }}</head>
<body class="min-h-screen flex flex-col bg-stone-50 text-stone-900 font-sans">
  {{ partial "header.html" . }}

  <main class="flex-1 w-full max-w-2xl mx-auto px-6 py-10">
    <a href="{{ "/" | relURL }}" class="text-xs text-stone-400 hover:text-stone-900 transition-colors">← Home</a>

    <h1 class="mt-6 text-3xl font-bold tracking-tight leading-tight">{{ .Title }}</h1>
    {{- with .Date }}
    <p class="mt-2 text-xs text-stone-400 tabular-nums">{{ .Format "2006-01-02" }}</p>
    {{- end }}

    <div class="mt-8 prose prose-stone max-w-none text-sm leading-relaxed text-stone-700">
      {{ .Content }}
    </div>
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
