baseURL = "https://photos.ctsmith.org/"
locale = "en-us"
title = "Photos"
theme = "gallery"

[params]
  photographer = "Your Name"
  description   = "A photo gallery"
  # Number of columns in the project grid on the homepage (desktop)
  gridColumns   = 3
  # Root-relative asset path — served by the /assets Pages Function (streams from R2).
  # Images are referenced as {assetsBaseURL}/<key>/<size>.<fmt>
  # e.g. /assets/iceland-2025/001/1200.avif
  assetsBaseURL = "/assets"

[build]
  writeStats = true

# NOTE: no [imaging] block anymore — Hugo no longer processes images at build.
# Variants are pre-baked into R2 by the admin (600/1200/2400 px, AVIF + JPEG).
