<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Photo Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #1a5432;
      --green-bg: #f0f7f3;
      --red:      #8b1a1a;
      --red-bg:   #fdf0f0;
      --yellow-bg:#fffbe6;
      --border:   #c8c8c4;
      --border-light: #e4e4e0;
      --bg:       #ffffff;
      --text:     #111110;
      --muted:    #666662;
      --mono:     "JetBrains Mono", "Berkeley Mono", "Courier New", monospace;
      --font-size: 13px;
    }

    html { font-size: var(--font-size); -webkit-font-smoothing: antialiased; }
    body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100svh; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font-family: var(--mono); font-size: var(--font-size); cursor: pointer; border: none; background: none; }

    /* ── Layout ─────────────────────────────────────────────── */
    .page { max-width: 860px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── Header ─────────────────────────────────────────────── */
    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .site-name { font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .topbar-nav { display: flex; gap: 0; }
    .topbar-nav button {
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      margin-left: -1px;
      cursor: pointer;
    }
    .topbar-nav button:hover { background: #f5f5f4; }
    .topbar-nav button:first-child { border-radius: 2px 0 0 2px; }
    .topbar-nav button:last-child  { border-radius: 0 2px 2px 0; }

    /* ── Tab bar ─────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── Green action button ─────────────────────────────────── */
    .btn-action {
      display: inline-block;
      background: var(--green);
      color: #fff;
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--mono);
      font-weight: 600;
      border: 1px solid var(--green);
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .02em;
    }
    .btn-action:hover { background: #143f27; border-color: #143f27; text-decoration: none; }
    .btn-action:active { opacity: .85; }
    .btn-action[disabled] { opacity: .4; pointer-events: none; }

    /* Outline variant */
    .btn-outline {
      display: inline-block;
      background: transparent;
      color: var(--text);
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--mono);
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-outline:hover { background: #f5f5f4; }

    /* Danger */
    .btn-danger {
      background: transparent;
      color: var(--red);
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--mono);
      border: 1px solid #d8a0a0;
      border-radius: 2px;
      cursor: pointer;
    }
    .btn-danger:hover { background: var(--red-bg); }

    /* Small icon button */
    .btn-icon {
      padding: 3px 7px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
    }
    .btn-icon:hover { background: #f5f5f4; color: var(--text); }
    .btn-icon:disabled { opacity: .3; pointer-events: none; }

    /* ── Section heading ─────────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 0;
    }
    .section-head h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Table ───────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: #fafaf9;
    }
    tbody tr { border-bottom: 1px solid var(--border-light); cursor: pointer; }
    tbody tr:hover { background: #fafaf9; }
    tbody td { padding: 9px 10px; vertical-align: middle; }
    tbody tr:last-child { border-bottom: none; }

    .table-wrap { border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }

    /* ── Slug badge ──────────────────────────────────────────── */
    .slug-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: #fafaf9;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Status badge ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-draft    { border: 1px solid #c8a000; color: #7a5f00; background: var(--yellow-bg); }
    .badge-live     { border: 1px solid #2a7a4f; color: var(--green); background: var(--green-bg); }
    .badge-featured { border: 1px solid #6060c8; color: #3030a0; background: #f0f0ff; }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border-light); margin: 28px 0; }

    /* ── Modal overlay ──────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.35);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .overlay.hidden { display: none; }

    .sheet {
      background: var(--bg);
      border-top: 2px solid var(--border);
      width: 100%; max-width: 860px;
      max-height: 92svh; overflow-y: auto;
      padding: 0 0 48px;
    }

    .sheet-header {
      position: sticky; top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    .sheet-title { font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .sheet-close {
      font-size: 14px; color: var(--muted);
      border: 1px solid var(--border); border-radius: 2px;
      padding: 2px 8px; cursor: pointer; background: var(--bg);
      font-family: var(--mono);
    }
    .sheet-close:hover { background: #f5f5f4; }

    .sheet-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Form ────────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .field .field-hint { font-size: 11px; color: var(--muted); }
    .field input, .field textarea, .field select {
      font-family: var(--mono); font-size: 13px;
      padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 2px;
      background: var(--bg); color: var(--text); width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--green); box-shadow: 0 0 0 2px var(--green-bg);
    }
    .field textarea { min-height: 70px; resize: vertical; }
    .field-check { display: flex; align-items: center; gap: 8px; }
    .field-check input { width: auto; }
    .field-check label { font-size: 12px; font-weight: normal; letter-spacing: 0; text-transform: none; color: var(--text); }

    /* ── Upload zone ─────────────────────────────────────────── */
    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 2px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--green); background: var(--green-bg); }
    .upload-zone p { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .upload-zone strong { font-size: 13px; }

    /* ── Photo card list ─────────────────────────────────────── */
    .photo-list { display: flex; flex-direction: column; gap: 6px; }
    .photo-card {
      border: 1px solid var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }
    .photo-card-main {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
    }
    .photo-card-reorder {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .photo-card-thumb {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      background: #f0f0ee;
      border: 1px solid var(--border-light);
      overflow: hidden;
      border-radius: 1px;
    }
    .photo-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-card-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .photo-card-caption {
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 8px;
      border: 1px solid var(--border-light);
      border-radius: 2px;
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }
    .photo-card-caption:focus { outline: none; border-color: var(--green); }
    .photo-card-id { font-size: 10px; color: var(--muted); }
    .photo-card-del {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid transparent;
      border-radius: 2px;
    }
    .photo-card-del:hover { color: var(--red); background: var(--red-bg); border-color: #d8a0a0; }

    /* Body / feature section */
    .photo-body-section {
      border-top: 1px solid var(--border-light);
      padding: 6px 8px;
      background: #fafaf9;
    }
    .photo-body-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .photo-body-toggle {
      font-size: 11px;
      color: var(--green);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--mono);
    }
    .photo-body-toggle:hover { text-decoration: underline; }
    .photo-feature-btn {
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: 1px solid var(--border-light);
      border-radius: 2px;
      padding: 2px 6px;
      font-family: var(--mono);
    }
    .photo-feature-btn:hover { color: var(--text); border-color: var(--border); background: #f5f5f4; }
    .photo-body-editor { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
    .photo-body-editor textarea {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      resize: vertical;
      min-height: 80px;
      max-height: 200px;
      width: 100%;
      background: var(--bg);
    }
    .photo-body-editor textarea:focus { outline: none; border-color: var(--green); }
    .photo-body-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .hidden { display: none !important; }

    /* ── Featured items list (settings) ─────────────────────── */
    .featured-list { display: flex; flex-direction: column; gap: 4px; }
    .featured-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px;
      border: 1px solid var(--border-light);
      border-radius: 2px;
      background: #fafaf9;
      flex-wrap: wrap;
    }
    .featured-item-label { flex: 1; font-size: 12px; min-width: 0; }
    .featured-add-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .featured-add-row select, .featured-add-row input {
      font-family: var(--mono); font-size: 12px;
      padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 2px;
      background: var(--bg); color: var(--text);
    }
    .featured-add-row select { width: 90px; flex-shrink: 0; }
    .featured-add-row .feat-slug-input { flex: 1; min-width: 80px; }
    .featured-add-row .feat-photoid-input { width: 80px; flex-shrink: 0; }
    .featured-add-row .feat-label-input { width: 110px; flex-shrink: 0; }

    /* ── Rebuild bar ─────────────────────────────────────────── */
    .rebuild-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--muted);
    }
    .rebuild-bar .status { flex: 1; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #c8a000; flex-shrink: 0; }
    .dot.idle { background: var(--green); }
    .version-tag { font-size: 10px; opacity: .45; }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--text); color: #fff;
      border: 1px solid #333;
      padding: 7px 16px; border-radius: 2px; font-size: 12px;
      opacity: 0; transition: all .2s; pointer-events: none; white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--red); border-color: var(--red); }

    /* ── Empty / loading ─────────────────────────────────────── */
    .empty { padding: 32px 0; text-align: center; color: var(--muted); font-size: 12px; border: 1px solid var(--border-light); border-top: none; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Posts list ──────────────────────────────────────────── */
    .post-card {
      border: 1px solid var(--border-light);
      border-radius: 2px;
      padding: 10px 12px;
      display: flex; align-items: baseline; gap: 10px;
    }
    .post-card-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .post-card-title { font-size: 13px; font-weight: 600; }
    .post-card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .post-card-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }

    /* ── Mobile overrides ────────────────────────────────────── */
    @media (max-width: 480px) {
      .tab-btn { padding: 12px 20px; flex: 1; text-align: center; }

      /* Topbar: stack brand above buttons */
      .topbar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 10px 0 8px; }
      .topbar-left { width: 100%; justify-content: space-between; }
      .topbar-nav { width: 100%; }
      .topbar-nav button { flex: 1; text-align: center; font-size: 13px; }

      /* Hide slug column in series table */
      .col-slug { display: none; }

      /* Touch targets: 44px min height */
      .btn-action, .btn-outline, .btn-danger { min-height: 44px; display: flex; align-items: center; justify-content: center; }
      .btn-icon { min-height: 44px; min-width: 44px; justify-content: center; display: flex; align-items: center; }
      .topbar-nav button { min-height: 44px; padding: 4px 12px; }
      .sheet-close { min-height: 44px; padding: 4px 12px; }

      /* Post list */
      .post-card { flex-direction: column; gap: 8px; }
      .post-card-actions { width: 100%; }
      .post-card-actions button { flex: 1; min-height: 44px; }

      /* Photo card body actions */
      .photo-body-actions { gap: 8px; }
      .photo-body-actions button { flex: 1; min-height: 44px; }

      /* Featured add row */
      .featured-add-row { flex-direction: column; }
      .featured-add-row select,
      .featured-add-row .feat-slug-input,
      .featured-add-row .feat-photoid-input,
      .featured-add-row .feat-label-input { width: 100%; flex: none; }
      .featured-add-row button { min-height: 44px; }

      /* Settings / form */
      .field input, .field textarea, .field select { font-size: 16px; } /* prevent zoom on iOS */

      /* Post editor body textarea taller on mobile */
      #post-body { min-height: 200px; }

      /* No horizontal overflow */
      .page { padding-left: 12px; padding-right: 12px; }
      .sheet-body { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="site-name">Photo Admin</span>
      <div class="topbar-nav">
        <button onclick="openSettings()">Settings</button>
        <button id="btn-new" onclick="onNew()">+ New</button>
        <button id="btn-rebuild" onclick="rebuild()"><span id="rebuild-icon">↻</span> Rebuild</button>
      </div>
    </div>
    <span style="font-size:11px;color:var(--muted)" id="rebuild-label">—</span>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-series" onclick="switchTab('series')">Series</button>
    <button class="tab-btn" id="tab-btn-posts" onclick="switchTab('posts')">Posts</button>
  </div>

  <!-- Series tab -->
  <div id="tab-series">
    <div class="section-head">
      <h2>Series</h2>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-slug" style="width:130px">Slug</th>
            <th>Title</th>
            <th style="width:70px;text-align:right">Photos</th>
            <th style="width:70px">Status</th>
            <th style="width:90px"></th>
          </tr>
        </thead>
        <tbody id="project-tbody">
          <tr><td colspan="5"><div class="empty">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Posts tab -->
  <div id="tab-posts" class="hidden">
    <div class="section-head" style="margin-bottom:12px">
      <h2>Posts</h2>
    </div>
    <div id="posts-list" style="display:flex;flex-direction:column;gap:6px">
      <div class="empty" style="border:1px solid var(--border-light)">Loading…</div>
    </div>
  </div>

</div>

<!-- Rebuild bar -->
<div class="rebuild-bar">
  <div class="dot idle" id="rebuild-dot"></div>
  <span class="status" id="rebuild-status">Site up to date</span>
  <span class="version-tag" id="version-tag"></span>
</div>

<!-- ── New series sheet ──────────────────────────────────────── -->
<div class="overlay hidden" id="overlay-new" onclick="closeIfBackdrop(event,'overlay-new')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">New Series</span>
      <button class="sheet-close" onclick="closeSheet('overlay-new')">close [esc]</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="new-title" placeholder="e.g. Iceland 2025" autocomplete="off">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="new-desc" placeholder="Short description shown on the project page…"></textarea>
      </div>
      <div>
        <button class="btn-action" onclick="createProject()">Create series →</button>
      </div>
    </div>
  </div>
</div>

<!-- ── New / Edit post sheet ─────────────────────────────────── -->
<div class="overlay hidden" id="overlay-post" onclick="closeIfBackdrop(event,'overlay-post')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title" id="post-sheet-title">New Post</span>
      <button class="sheet-close" onclick="closeSheet('overlay-post')">close [esc]</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="post-title" placeholder="Post title" autocomplete="off">
      </div>
      <div class="field">
        <label>Excerpt</label>
        <textarea id="post-excerpt" rows="2" style="min-height:50px" placeholder="Short excerpt for cards — leave blank to skip"></textarea>
      </div>
      <div class="field">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <label style="margin-bottom:0">Body (markdown)</label>
          <button class="btn-outline" style="font-size:11px;padding:3px 8px" onclick="openPhotoPicker()">⊕ Insert photo</button>
        </div>
        <textarea id="post-body" rows="12" style="min-height:220px" placeholder="Write your post in markdown…"></textarea>
      </div>
      <div class="field-check">
        <input type="checkbox" id="post-featured">
        <label for="post-featured">Feature on homepage</label>
      </div>
      <div class="field-check">
        <input type="checkbox" id="post-draft" checked>
        <label for="post-draft">Draft — hide from public site</label>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-action" onclick="savePost()">Save post →</button>
        <button class="btn-outline" id="post-delete-btn" onclick="deletePost()" style="display:none">Delete</button>
      </div>
    </div>
  </div>
</div>

    <div class="sheet-body" id="detail-body"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────
let projects      = [];
let posts         = [];
let currentTab    = 'series';
let editingPost   = null;
let featuredItems = [];
let panelSettings = {}; // cached per-panel settings (series detail)

// ── Init ─────────────────────────────────────────────────────────
loadProjects();
setRebuildStatus('idle', 'Site up to date');
loadVersion();

async function loadVersion() {
  try {
    const v = await api('GET', '/version');
    const el = document.getElementById('version-tag');
    if (el && v.version) el.textContent = 'v' + v.version;
  } catch(_) {}
}

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-series').classList.toggle('hidden', tab !== 'series');
  document.getElementById('tab-posts').classList.toggle('hidden', tab !== 'posts');
  document.getElementById('tab-btn-series').classList.toggle('active', tab === 'series');
  document.getElementById('tab-btn-posts').classList.toggle('active', tab === 'posts');
  document.getElementById('btn-new').textContent = tab === 'series' ? '+ New Series' : '+ New Post';
  if (tab === 'posts') loadPostsList();
}

function onNew() {
  if (currentTab === 'series') openNewProject();
  else openNewPost();
}

// ── API ──────────────────────────────────────────────────────────
async function api(method, path, body, isForm) {
  const opts = { method };
  if (body && !isForm) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
  else if (isForm) { opts.body = body; }
  const res = await fetch('/api' + path, opts);
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2800);
}

// ── Project list ─────────────────────────────────────────────────
async function loadProjects() {
  try {
    projects = await api('GET', '/projects');
    renderTable();
  } catch(e) {
    toast('Failed to load series: ' + e.message, true);
    document.getElementById('project-tbody').innerHTML =
      `<tr><td colspan="5"><div class="empty">Failed to load — ${esc(e.message)}</div></td></tr>`;
  }
}

function renderTable() {
  const tbody = document.getElementById('project-tbody');
  if (!projects.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty">No series yet — click "+ New Series" to create one.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = projects.map(p => `
    <tr onclick="openDetail('${p.slug}')">
      <td class="col-slug"><span class="slug-badge">${esc(p.slug)}</span></td>
      <td>${esc(p.title)}</td>
      <td style="text-align:right;color:var(--muted)">${p.photoCount}</td>
      <td><span class="badge ${p.draft ? 'badge-draft' : 'badge-live'}">${p.draft ? 'Draft' : 'Live'}</span></td>
      <td style="text-align:right"><button class="btn-action" onclick="openDetail('${p.slug}');event.stopPropagation()">Open →</button></td>
    </tr>
  `).join('');
}

// ── New project ───────────────────────────────────────────────────
function openNewProject() {
  document.getElementById('new-title').value = '';
  document.getElementById('new-desc').value = '';
  openSheet('overlay-new');
  setTimeout(() => document.getElementById('new-title').focus(), 150);
}

async function createProject() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) { toast('Title is required', true); return; }
  try {
    await api('POST', '/projects', { title, description: document.getElementById('new-desc').value.trim() });
    closeSheet('overlay-new');
    await loadProjects();
    setRebuildStatus('dirty', 'Rebuild needed');
    toast(`"${title}" created`);
  } catch(e) { toast(e.message, true); }
}

// ── Project detail ────────────────────────────────────────────────
async function openDetail(slug) {
  const p = projects.find(x => x.slug === slug);
  if (!p) return;
  document.getElementById('detail-title').textContent = p.slug;
  document.getElementById('detail-body').innerHTML = `<div style="color:var(--muted);font-size:12px">Loading…</div>`;
  openSheet('overlay-detail');
  const [photos, settings] = await Promise.all([
    api('GET', `/projects/${slug}/photos`),
    api('GET', '/settings').catch(() => ({})),
  ]);
  panelSettings = settings || {};
  renderDetail(p, photos, panelSettings);
}

function renderDetail(p, photos, settings) {
  const currentHeroKey = settings && settings.heroPhotoKey ? settings.heroPhotoKey : '';
  const thisSeriesIsHero = currentHeroKey.startsWith(p.slug + '/');

  const heroOptions = ['<option value="">None</option>']
    .concat(photos.map(f => {
      const label = f.caption ? `${f.id} — ${esc(f.caption)}` : f.id;
      const sel = currentHeroKey === `${p.slug}/${f.id}` ? ' selected' : '';
      return `<option value="${p.slug}/${f.id}"${sel}>${label}</option>`;
    })).join('');

  document.getElementById('detail-body').innerHTML = `

    <!-- Status row -->
    <div style="display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border-light);flex-wrap:wrap">
      <span class="badge ${p.draft ? 'badge-draft' : 'badge-live'}">${p.draft ? 'Draft' : 'Live'}</span>
      <span style="font-size:12px;color:var(--muted)">${photos.length} photo${photos.length !== 1 ? 's' : ''}</span>
      <div style="flex:1"></div>
      <button class="btn-action" onclick="togglePublish('${p.slug}', ${p.draft})">
        ${p.draft ? 'Publish →' : 'Unpublish →'}
      </button>
      <button class="btn-danger" onclick="deleteSeries('${p.slug}')">Delete series</button>
    </div>

    <!-- Photos -->
    ${photos.length ? `
      <div>
        <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Photos</div>
        <div class="photo-list" id="photo-list-${p.slug}">
          ${photos.map((f, i) => photoCardHTML(p.slug, f, i, photos.length)).join('')}
        </div>
      </div>
    ` : ''}

    <!-- Upload -->
    <div class="upload-zone" id="drop-${p.slug}"
         onclick="document.getElementById('file-${p.slug}').click()"
         ondragover="dragOver(event,this)" ondragleave="dragLeave(this)" ondrop="dropFiles(event,'${p.slug}',this)">
      <strong>Add photos</strong>
      <p>Click to choose files · or drag & drop · JPG, PNG, WEBP, AVIF</p>
      <input type="file" id="file-${p.slug}" accept="image/*" multiple style="display:none"
             onchange="uploadFiles(this.files,'${p.slug}')">
    </div>

    <!-- Metadata -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Details</div>
      <div class="field"><label>Title</label><input type="text" id="edit-title-${p.slug}" value="${esc(p.title)}"></div>
      <div class="field"><label>Description</label><textarea id="edit-desc-${p.slug}">${esc(p.description)}</textarea></div>
      <div><button class="btn-outline" onclick="saveMetadata('${p.slug}')">Save details →</button></div>
    </div>

    <!-- Hero -->
    <div style="display:flex;flex-direction:column;gap:8px;padding-top:16px;border-top:1px solid var(--border-light)">
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Homepage hero</div>
      <div class="field">
        <label>Hero photo</label>
        <select id="hero-select-${p.slug}">${heroOptions}</select>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button class="btn-outline" onclick="setHero('${p.slug}')">Set as hero</button>
        ${thisSeriesIsHero ? `<button class="btn-outline" style="color:var(--muted)" onclick="clearHero()">Clear hero</button>` : ''}
        ${currentHeroKey && !thisSeriesIsHero ? `<span style="font-size:11px;color:var(--muted)">Current hero: ${esc(currentHeroKey)}</span>` : ''}
      </div>
    </div>

  `;
}

function featureBtnHTML(slug, id) {
  const featured = Array.isArray(panelSettings.featured) ? panelSettings.featured : [];
  const isFeatured = featured.some(f => f.type === 'photo' && f.slug === slug && f.photoId === id);
  if (isFeatured) {
    return `<span class="badge badge-featured" style="font-size:10px;padding:2px 6px">Featured ✓</span>
            <button class="photo-feature-btn" style="color:var(--red);border-color:#d8a0a0" onclick="unfeaturePhoto('${slug}','${esc(id)}')">Remove</button>`;
  }
  return `<button class="photo-feature-btn" onclick="featurePhoto('${slug}','${esc(id)}')">✦ Feature</button>`;
}

function photoCardHTML(slug, f, idx, total) {
  const hasBody = f.body && f.body.trim();
  return `
    <div class="photo-card" id="pcard-${slug}-${esc(f.id)}">
      <div class="photo-card-main">
        <div class="photo-card-reorder">
          <button class="btn-icon" title="Move up" ${idx === 0 ? 'disabled' : ''}
            onclick="movePhoto('${slug}','${esc(f.id)}',-1)">▲</button>
          <button class="btn-icon" title="Move down" ${idx === total-1 ? 'disabled' : ''}
            onclick="movePhoto('${slug}','${esc(f.id)}',1)">▼</button>
        </div>
        <div class="photo-card-thumb">
          <img src="/assets/${esc(f.key)}/600.jpg" loading="lazy" onerror="this.style.display='none'">
        </div>
        <div class="photo-card-fields">
          <div class="photo-card-id">${esc(f.id)}</div>
          <input class="photo-card-caption" type="text"
            placeholder="Caption…"
            value="${esc(f.caption || '')}"
            onblur="saveCaption('${slug}','${esc(f.id)}',this)">
          <div style="font-size:10px;color:var(--muted);line-height:1.3">Used as the page title for the photo's post page. Add a caption to name this photo.</div>
        </div>
        <button class="photo-card-del" onclick="deletePhoto('${slug}','${esc(f.id)}',event)" title="Delete">✕</button>
      </div>
      <div class="photo-body-section">
        <div class="photo-body-row">
          <button class="photo-body-toggle" onclick="toggleBodyEditor(this,'${slug}','${esc(f.id)}')">
            ${hasBody ? '▸ Edit note' : '▸ Add note'}
          </button>
          <div id="feat-btn-${slug}-${esc(f.id)}">${featureBtnHTML(slug, f.id)}</div>
        </div>
        <div class="photo-body-editor hidden" id="body-editor-${slug}-${esc(f.id)}">
          <textarea rows="4" placeholder="Markdown note shown on the photo permalink page…">${esc(hasBody ? f.body : '')}</textarea>
          <div class="photo-body-actions">
            <button class="btn-outline" style="font-size:11px;padding:3px 10px"
              onclick="saveBody('${slug}','${esc(f.id)}',this)">Save note</button>
            ${hasBody ? `<button class="btn-outline" style="font-size:11px;padding:3px 10px;color:var(--muted)"
              onclick="clearBody('${slug}','${esc(f.id)}',this)">Remove note</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleBodyEditor(btn, slug, id) {
  const editor = document.getElementById(`body-editor-${slug}-${id}`);
  const hidden = editor.classList.contains('hidden');
  editor.classList.toggle('hidden', !hidden);
  const isAdd = btn.textContent.includes('Add');
  btn.textContent = hidden
    ? (isAdd ? '▾ Add note' : '▾ Edit note')
    : (isAdd ? '▸ Add note' : '▸ Edit note');
}

// ── Hero ──────────────────────────────────────────────────────────
async function setHero(slug) {
  const select = document.getElementById(`hero-select-${slug}`);
  const key = select.value;
  if (!key) { await clearHero(); return; }
  try {
    await api('PATCH', '/settings', { heroPhotoKey: key, heroLink: `/projects/${slug}/` });
    toast('Homepage hero updated — rebuild to publish');
    setRebuildStatus('dirty', 'Rebuild needed');
  } catch(e) { toast('Failed: ' + e.message, true); }
}

async function clearHero() {
  try {
    await api('PATCH', '/settings', { heroPhotoKey: '', heroLink: '' });
    toast('Hero cleared — rebuild to publish');
    setRebuildStatus('dirty', 'Rebuild needed');
  } catch(e) { toast('Failed: ' + e.message, true); }
}

// ── Feature a photo ───────────────────────────────────────────────
async function featurePhoto(slug, id) {
  try {
    const featured = Array.isArray(panelSettings.featured) ? panelSettings.featured : [];
    if (featured.some(f => f.type === 'photo' && f.slug === slug && f.photoId === id)) {
      toast('Already in featured'); return;
    }
    const updated = [{ type: 'photo', slug, photoId: id, label: '' }, ...featured];
    await api('PATCH', '/settings', { featured: updated });
    panelSettings.featured = updated;
    const el = document.getElementById(`feat-btn-${slug}-${id}`);
    if (el) el.innerHTML = featureBtnHTML(slug, id);
    toast('Added to featured — rebuild to publish');
    setRebuildStatus('dirty', 'Rebuild needed');
  } catch(e) { toast('Failed: ' + e.message, true); }
}

async function unfeaturePhoto(slug, id) {
  try {
    const featured = Array.isArray(panelSettings.featured) ? panelSettings.featured : [];
    const updated = featured.filter(f => !(f.type === 'photo' && f.slug === slug && f.photoId === id));
    await api('PATCH', '/settings', { featured: updated });
    panelSettings.featured = updated;
    const el = document.getElementById(`feat-btn-${slug}-${id}`);
    if (el) el.innerHTML = featureBtnHTML(slug, id);
    toast('Removed from featured — rebuild to publish');
    setRebuildStatus('dirty', 'Rebuild needed');
  } catch(e) { toast('Failed: ' + e.message, true); }
}

// ── Photo reorder ─────────────────────────────────────────────────
async function movePhoto(slug, id, direction) {
  let photos;
  try { photos = await api('GET', `/projects/${slug}/photos`); }
  catch(e) { toast('Failed to fetch photos: ' + e.message, true); return; }

  const idx = photos.findIndex(f => f.id === id);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= photos.length) return;

  [photos[idx], photos[newIdx]] = [photos[newIdx], photos[idx]];
  const photoOrder = photos.map(f => f.id);

  try {
    await api('PATCH', `/projects/${slug}`, { photoOrder });
    setRebuildStatus('dirty', 'Rebuild needed');
    const list = document.getElementById(`photo-list-${slug}`);
    if (list) list.innerHTML = photos.map((f, i) => photoCardHTML(slug, f, i, photos.length)).join('');
    toast('Order saved');
  } catch(e) { toast('Reorder failed: ' + e.message, true); }
}

// ── Caption / body ────────────────────────────────────────────────
async function saveCaption(slug, id, input) {
  const caption = input.value.trim();
  try {
    await api('PATCH', `/projects/${slug}/photos/${id}`, { caption });
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Caption saved');
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

async function saveBody(slug, id, btn) {
  const editor = document.getElementById(`body-editor-${slug}-${id}`);
  const body = editor.querySelector('textarea').value;
  try {
    await api('PATCH', `/projects/${slug}/photos/${id}`, { body });
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Note saved');
    const toggle = editor.closest('.photo-card').querySelector('.photo-body-toggle');
    toggle.textContent = '▾ Edit note';
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

async function clearBody(slug, id, btn) {
  const editor = document.getElementById(`body-editor-${slug}-${id}`);
  if (!confirm('Remove this note?')) return;
  try {
    await api('PATCH', `/projects/${slug}/photos/${id}`, { body: '' });
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Note removed');
    const toggle = editor.closest('.photo-card').querySelector('.photo-body-toggle');
    toggle.textContent = '▸ Add note';
    editor.querySelector('textarea').value = '';
    editor.classList.add('hidden');
    btn.remove();
  } catch(e) { toast('Remove failed: ' + e.message, true); }
}

async function deletePhoto(slug, id, e) {
  e.stopPropagation();
  if (!confirm(`Delete photo ${id}?`)) return;
  try {
    await api('DELETE', `/projects/${slug}/photos/${id}`);
    document.getElementById(`pcard-${slug}-${id}`)?.remove();
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Deleted ' + id);
  } catch(e) { toast('Delete failed: ' + e.message, true); }
}

const MAX_UPLOAD_BYTES = 30 * 1024 * 1024;
const MAX_UPLOAD_PX    = 8000;
const UPLOAD_QUALITY   = 0.92;

function resizeForUpload(file) {
  if (file.size <= MAX_UPLOAD_BYTES) return Promise.resolve(file);
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const { naturalWidth: w, naturalHeight: h } = img;
      const scale = Math.min(1, MAX_UPLOAD_PX / Math.max(w, h));
      const cw = Math.round(w * scale);
      const ch = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = ch;
      canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
      canvas.toBlob(
        (blob) => {
          if (!blob) { reject(new Error('Canvas export failed')); return; }
          resolve(new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' }));
        },
        'image/jpeg', UPLOAD_QUALITY
      );
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}

async function uploadFiles(files, slug) {
  if (!files.length) return;
  const zone = document.getElementById(`drop-${slug}`);
  const total = files.length;
  let succeeded = 0, failed = 0;

  for (let i = 0; i < total; i++) {
    const file = files[i];
    zone.innerHTML = `<strong><span class="spin">↻</span> Preparing photo ${i + 1} of ${total}…</strong>`;
    let processed;
    try { processed = await resizeForUpload(file); }
    catch(e) { failed++; toast(`Skipped ${file.name}: ${e.message}`, true); continue; }

    zone.innerHTML = `<strong><span class="spin">↻</span> Uploading ${i + 1} of ${total}…</strong>`;
    const fd = new FormData();
    fd.append('photos', processed);
    try {
      await api('POST', `/projects/${slug}/photos`, fd, true);
      succeeded++;
    } catch(e) { failed++; toast(`Failed ${file.name}: ${e.message}`, true); }
  }

  if (failed === 0) toast(`Uploaded ${succeeded} photo${succeeded !== 1 ? 's' : ''}`);
  else toast(`${succeeded} uploaded, ${failed} failed`, failed > 0);

  setRebuildStatus('dirty', 'Rebuild needed');
  const p = projects.find(x => x.slug === slug);
  const [photos, settings] = await Promise.all([
    api('GET', `/projects/${slug}/photos`).catch(() => []),
    api('GET', '/settings').catch(() => ({})),
  ]);
  panelSettings = settings || {};
  renderDetail(p, photos, panelSettings);
}

function dragOver(e, el) { e.preventDefault(); el.classList.add('drag'); }
function dragLeave(el) { el.classList.remove('drag'); }
function dropFiles(e, slug, el) { e.preventDefault(); el.classList.remove('drag'); uploadFiles(e.dataTransfer.files, slug); }

async function saveMetadata(slug) {
  const title = document.getElementById(`edit-title-${slug}`).value.trim();
  const description = document.getElementById(`edit-desc-${slug}`).value.trim();
  try {
    await api('PATCH', `/projects/${slug}`, { title, description });
    await loadProjects();
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Saved');
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

async function togglePublish(slug, isDraft) {
  try {
    await api('POST', `/projects/${slug}/publish`, { draft: !isDraft });
    await loadProjects();
    closeSheet('overlay-detail');
    setRebuildStatus('dirty', 'Rebuild needed');
    toast(isDraft ? 'Published' : 'Moved to draft');
  } catch(e) { toast('Failed to update status: ' + e.message, true); }
}

async function deleteSeries(slug) {
  if (!confirm(`Delete series '${slug}' and all its photos? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/projects/${slug}`);
    closeSheet('overlay-detail');
    await loadProjects();
    setRebuildStatus('dirty', 'Rebuild needed');
    toast(`Deleted series '${slug}'`);
  } catch(e) { toast('Delete failed: ' + e.message, true); }
}

// ── Posts ─────────────────────────────────────────────────────────
async function loadPostsList() {
  const container = document.getElementById('posts-list');
  container.innerHTML = `<div class="empty" style="border:1px solid var(--border-light)">Loading…</div>`;
  try {
    posts = await api('GET', '/posts');
    renderPostsList();
  } catch(e) {
    container.innerHTML = `<div class="empty" style="border:1px solid var(--border-light)">Failed to load — ${esc(e.message)}</div>`;
    toast('Failed to load posts: ' + e.message, true);
  }
}

function renderPostsList() {
  const container = document.getElementById('posts-list');
  if (!posts.length) {
    container.innerHTML = `<div class="empty" style="border:1px solid var(--border-light)">No posts yet — click "+ New Post" to create one.</div>`;
    return;
  }
  container.innerHTML = posts.map(p => `
    <div class="post-card">
      <div class="post-card-info">
        <div class="post-card-title">${esc(p.title)}</div>
        <div class="post-card-meta">
          <span>${p.date || '—'}</span>
          ${p.draft ? `<span class="badge badge-draft">Draft</span>` : `<span class="badge badge-live">Live</span>`}
          ${p.featured ? `<span class="badge badge-featured">Featured</span>` : ''}
        </div>
      </div>
      <div class="post-card-actions">
        <button class="btn-outline" style="font-size:11px;padding:3px 8px" onclick="openEditPost('${esc(p.slug)}')">Edit</button>
        <button class="btn-outline" style="font-size:11px;padding:3px 8px" onclick="togglePostPublish('${esc(p.slug)}',${p.draft})">${p.draft ? 'Publish' : 'Unpublish'}</button>
        <button class="btn-danger" style="font-size:11px;padding:3px 8px" onclick="confirmDeletePost('${esc(p.slug)}','${esc(p.title)}')">Del</button>
      </div>
    </div>
  `).join('');
}

function openNewPost() {
  editingPost = null;
  document.getElementById('post-sheet-title').textContent = 'New Post';
  document.getElementById('post-title').value = '';
  document.getElementById('post-excerpt').value = '';
  document.getElementById('post-body').value = '';
  document.getElementById('post-featured').checked = false;
  document.getElementById('post-draft').checked = true;
  document.getElementById('post-delete-btn').style.display = 'none';
  openSheet('overlay-post');
  setTimeout(() => document.getElementById('post-title').focus(), 150);
}

async function openEditPost(slug) {
  editingPost = slug;
  document.getElementById('post-sheet-title').textContent = 'Edit Post';
  document.getElementById('post-delete-btn').style.display = '';
  openSheet('overlay-post');
  try {
    const [p, settings] = await Promise.all([
      api('GET', `/posts/${slug}`),
      api('GET', '/settings').catch(() => ({})),
    ]);
    document.getElementById('post-title').value   = p.title   || '';
    document.getElementById('post-excerpt').value = p.excerpt || '';
    document.getElementById('post-body').value    = p.body    || '';
    document.getElementById('post-draft').checked = !!p.draft;
    // Source of truth for featured is settings.featured[], not post front matter
    const featuredArr = Array.isArray(settings.featured) ? settings.featured : [];
    document.getElementById('post-featured').checked = featuredArr.some(f => f.type === 'post' && f.slug === slug);
  } catch(e) { toast('Failed to load post: ' + e.message, true); }
}

async function savePost() {
  const title    = document.getElementById('post-title').value.trim();
  const excerpt  = document.getElementById('post-excerpt').value.trim();
  const body     = document.getElementById('post-body').value;
  const featured = document.getElementById('post-featured').checked;
  const draft    = document.getElementById('post-draft').checked;

  if (!title) { toast('Title is required', true); return; }

  try {
    let slug;
    if (!editingPost) {
      await api('POST', '/posts', { title, excerpt, body, featured });
      // Find the new post's slug by re-fetching the list and matching by title
      try {
        const allPosts = await api('GET', '/posts');
        const match = allPosts.find(p => p.title === title);
        slug = match ? match.slug : null;
      } catch(_) {}
      toast(`Post "${title}" created`);
    } else {
      slug = editingPost;
      await api('PATCH', `/posts/${editingPost}`, { title, excerpt, body, featured, draft });
      toast('Post saved');
    }
    // Sync featured state into settings.featured[] (the real source of truth for the homepage)
    if (slug) {
      try {
        const currentSettings = await api('GET', '/settings');
        const featuredArr = Array.isArray(currentSettings.featured) ? currentSettings.featured : [];
        const alreadyIn = featuredArr.some(f => f.type === 'post' && f.slug === slug);
        if (featured && !alreadyIn) {
          await api('PATCH', '/settings', { featured: [{ type: 'post', slug, label: '' }, ...featuredArr] });
        } else if (!featured && alreadyIn) {
          await api('PATCH', '/settings', { featured: featuredArr.filter(f => !(f.type === 'post' && f.slug === slug)) });
        }
      } catch(_) {}
    }
    closeSheet('overlay-post');
    setRebuildStatus('dirty', 'Rebuild needed');
    await loadPostsList();
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

async function togglePostPublish(slug, isDraft) {
  try {
    await api('POST', `/posts/${slug}/publish`, { draft: !isDraft });
    setRebuildStatus('dirty', 'Rebuild needed');
    toast(isDraft ? 'Post published' : 'Post moved to draft');
    await loadPostsList();
  } catch(e) { toast('Failed: ' + e.message, true); }
}

async function confirmDeletePost(slug, title) {
  if (!confirm(`Delete post "${title}"? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/posts/${slug}`);
    setRebuildStatus('dirty', 'Rebuild needed');
    toast(`Deleted "${title}"`);
    await loadPostsList();
  } catch(e) { toast('Delete failed: ' + e.message, true); }
}

async function deletePost() {
  if (!editingPost) return;
  const title = document.getElementById('post-title').value || editingPost;
  if (!confirm(`Delete post "${title}"? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/posts/${editingPost}`);
    closeSheet('overlay-post');
    setRebuildStatus('dirty', 'Rebuild needed');
    toast(`Deleted "${title}"`);
    await loadPostsList();
  } catch(e) { toast('Delete failed: ' + e.message, true); }
}

// ── Photo picker (for post body) ──────────────────────────────────
async function openPhotoPicker() {
  const select = document.getElementById('picker-series-select');
  select.innerHTML = '<option value="">Select series…</option>';
  try {
    const projs = await api('GET', '/projects');
    projs.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.slug;
      opt.textContent = p.title || p.slug;
      select.appendChild(opt);
    });
  } catch(e) { toast('Failed to load series', true); return; }
  document.getElementById('picker-photo-grid').innerHTML = '';
  document.getElementById('picker-alt').value = '';
  document.getElementById('overlay-photo-picker').classList.remove('hidden');
}

async function loadPickerPhotos() {
  const slug = document.getElementById('picker-series-select').value;
  const grid = document.getElementById('picker-photo-grid');
  if (!slug) { grid.innerHTML = ''; return; }
  grid.innerHTML = '<span style="font-size:12px;color:var(--muted)">Loading…</span>';
  try {
    const photos = await api('GET', `/projects/${slug}/photos`);
    grid.innerHTML = '';
    photos.forEach(p => {
      const img = document.createElement('img');
      img.src = `/assets/${p.key}/600.jpg`;
      img.style.cssText = 'width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;border-radius:2px;border:2px solid transparent';
      img.title = p.caption || p.id;
      img.onclick = () => insertPhotoMarkdown(p);
      grid.appendChild(img);
    });
  } catch(e) { grid.innerHTML = '<span style="font-size:12px;color:var(--red)">Failed to load</span>'; }
}

function insertPhotoMarkdown(photo) {
  const size   = document.getElementById('picker-size').value;
  const altRaw = document.getElementById('picker-alt').value.trim();
  const alt    = altRaw || photo.caption || photo.id;
  const url    = `/assets/${photo.key}/${size}.jpg`;
  const md     = `![${alt}](${url})\n`;

  const ta = document.getElementById('post-body');
  const start = ta.selectionStart;
  const end   = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + md + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + md.length;
  ta.focus();
  closeSheet('overlay-photo-picker');
  toast('Photo inserted');
}

// ── Rebuild ───────────────────────────────────────────────────────
function setRebuildStatus(state, msg) {
  document.getElementById('rebuild-dot').className = 'dot' + (state === 'idle' ? ' idle' : '');
  document.getElementById('rebuild-status').textContent = msg;
  document.getElementById('rebuild-label').textContent = msg;
}

async function rebuild() {
  const icon = document.getElementById('rebuild-icon');
  icon.className = 'spin'; icon.textContent = '↻';
  document.getElementById('btn-rebuild').disabled = true;
  setRebuildStatus('building', 'Triggering build…');
  try {
    await api('POST', '/rebuild');
    setRebuildStatus('idle', 'Build triggered ✓');
    toast('Build triggered — check Cloudflare Pages for progress');
  } catch(e) {
    setRebuildStatus('error', 'Failed to trigger build');
    toast('Failed to trigger build: ' + e.message, true);
  }
  icon.className = ''; icon.textContent = '↻';
  document.getElementById('btn-rebuild').disabled = false;
}

// ── Settings ──────────────────────────────────────────────────────
async function openSettings() {
  openSheet('overlay-settings');
  try {
    const s = await api('GET', '/settings');
    document.getElementById('set-title').value        = s.title        ?? '';
    document.getElementById('set-nav').value          = s.navLabel     ?? '';
    document.getElementById('set-photographer').value = s.photographer ?? '';
    document.getElementById('set-description').value  = s.description  ?? '';
    featuredItems = Array.isArray(s.featured) ? s.featured.map(f => ({...f})) : [];
    renderFeaturedList();
  } catch(e) { toast('Failed to load settings: ' + e.message, true); }
}

function onFeatTypeChange() {
  const type = document.getElementById('feat-type').value;
  const isPhoto = type === 'photo';
  document.getElementById('feat-photo-id').classList.toggle('hidden', !isPhoto);
  document.getElementById('feat-photo-hint').style.display = isPhoto ? '' : 'none';
}

function renderFeaturedList() {
  const list = document.getElementById('featured-list');
  if (!featuredItems.length) {
    list.innerHTML = `<div style="font-size:11px;color:var(--muted);padding:4px 0">No featured items</div>`;
    return;
  }
  list.innerHTML = featuredItems.map((item, idx) => {
    const typeLabel = item.type === 'photo' ? 'photo' : item.type;
    const itemLabel = item.type === 'photo'
      ? `${esc(item.slug)}/${esc(item.photoId || '')}${item.label ? ' — ' + esc(item.label) : ''}`
      : `${esc(item.slug)}${item.label ? ' — ' + esc(item.label) : ''}`;
    return `
      <div class="featured-item">
        <span class="badge" style="font-size:10px;padding:1px 5px;border:1px solid var(--border)">${typeLabel}</span>
        <span class="featured-item-label">${itemLabel}</span>
        <button class="btn-icon" ${idx === 0 ? 'disabled' : ''} onclick="moveFeatured(${idx},-1)">▲</button>
        <button class="btn-icon" ${idx === featuredItems.length-1 ? 'disabled' : ''} onclick="moveFeatured(${idx},1)">▼</button>
        <button class="btn-icon" onclick="removeFeatured(${idx})" style="color:var(--red)">✕</button>
      </div>
    `;
  }).join('');
}

function addFeaturedItem() {
  const type    = document.getElementById('feat-type').value;
  const slug    = document.getElementById('feat-slug').value.trim();
  const label   = document.getElementById('feat-label').value.trim();
  const photoId = type === 'photo' ? document.getElementById('feat-photo-id').value.trim() : undefined;

  if (!slug) { toast('Slug is required', true); return; }
  if (type === 'photo' && !photoId) { toast('Photo ID is required', true); return; }

  const item = { type, slug, label };
  if (photoId) item.photoId = photoId;
  featuredItems.push(item);

  document.getElementById('feat-slug').value = '';
  document.getElementById('feat-label').value = '';
  document.getElementById('feat-photo-id').value = '';
  renderFeaturedList();
}

function removeFeatured(idx) {
  featuredItems.splice(idx, 1);
  renderFeaturedList();
}

function moveFeatured(idx, dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= featuredItems.length) return;
  [featuredItems[idx], featuredItems[ni]] = [featuredItems[ni], featuredItems[idx]];
  renderFeaturedList();
}

async function saveSettings() {
  const body = {
    title:        document.getElementById('set-title').value.trim(),
    navLabel:     document.getElementById('set-nav').value.trim(),
    photographer: document.getElementById('set-photographer').value.trim(),
    description:  document.getElementById('set-description').value.trim(),
    featured:     featuredItems,
  };
  try {
    await api('PATCH', '/settings', body);
    closeSheet('overlay-settings');
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Settings saved — rebuild to publish');
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

// ── Sheet helpers ─────────────────────────────────────────────────
function openSheet(id) { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function closeSheet(id) { document.getElementById(id).classList.add('hidden'); document.body.style.overflow = ''; }
function closeIfBackdrop(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  ['overlay-detail','overlay-new','overlay-settings','overlay-post'].forEach(id => {
    if (!document.getElementById(id).classList.contains('hidden')) closeSheet(id);
  });
});

// ── Util ──────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
