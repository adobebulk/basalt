<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Photo Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #1a5432;
      --green-bg: #f0f7f3;
      --red:      #8b1a1a;
      --red-bg:   #fdf0f0;
      --yellow-bg:#fffbe6;
      --border:   #c8c8c4;
      --border-light: #e4e4e0;
      --bg:       #ffffff;
      --text:     #111110;
      --muted:    #666662;
      --mono:     "JetBrains Mono", "Berkeley Mono", "Courier New", monospace;
      --font-size: 13px;
    }

    html { font-size: var(--font-size); -webkit-font-smoothing: antialiased; }
    body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100svh; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font-family: var(--mono); font-size: var(--font-size); cursor: pointer; border: none; background: none; }

    /* ── Layout ─────────────────────────────────────────────── */
    .page { max-width: 860px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── Header ─────────────────────────────────────────────── */
    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .site-name { font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .topbar-nav { display: flex; gap: 0; }
    .topbar-nav button {
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      margin-left: -1px;
      cursor: pointer;
    }
    .topbar-nav button:hover { background: #f5f5f4; }
    .topbar-nav button:first-child { border-radius: 2px 0 0 2px; }
    .topbar-nav button:last-child  { border-radius: 0 2px 2px 0; }

    /* ── Tab bar ─────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── Green action button ─────────────────────────────────── */
    .btn-action {
      display: inline-block;
      background: var(--green);
      color: #fff;
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--mono);
      font-weight: 600;
      border: 1px solid var(--green);
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .02em;
    }
    .btn-action:hover { background: #143f27; border-color: #143f27; text-decoration: none; }
    .btn-action:active { opacity: .85; }
    .btn-action[disabled] { opacity: .4; pointer-events: none; }

    /* Outline variant */
    .btn-outline {
      display: inline-block;
      background: transparent;
      color: var(--text);
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--mono);
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-outline:hover { background: #f5f5f4; }

    /* Danger */
    .btn-danger {
      background: transparent;
      color: var(--red);
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--mono);
      border: 1px solid #d8a0a0;
      border-radius: 2px;
      cursor: pointer;
    }
    .btn-danger:hover { background: var(--red-bg); }

    /* Small icon button */
    .btn-icon {
      padding: 3px 7px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
    }
    .btn-icon:hover { background: #f5f5f4; color: var(--text); }
    .btn-icon:disabled { opacity: .3; pointer-events: none; }

    /* ── Section heading ─────────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 0;
    }
    .section-head h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Table ───────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: #fafaf9;
    }
    tbody tr { border-bottom: 1px solid var(--border-light); cursor: pointer; }
    tbody tr:hover { background: #fafaf9; }
    tbody td { padding: 9px 10px; vertical-align: middle; }
    tbody tr:last-child { border-bottom: none; }

    .table-wrap { border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }

    /* ── Slug badge ──────────────────────────────────────────── */
    .slug-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: #fafaf9;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Status badge ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-draft    { border: 1px solid #c8a000; color: #7a5f00; background: var(--yellow-bg); }
    .badge-live     { border: 1px solid #2a7a4f; color: var(--green); background: var(--green-bg); }
    .badge-featured { border: 1px solid #6060c8; color: #3030a0; background: #f0f0ff; }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border-light); margin: 28px 0; }

    /* ── Modal overlay ──────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.35);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .overlay.hidden { display: none; }

    .sheet {
      background: var(--bg);
      border-top: 2px solid var(--border);
      width: 100%; max-width: 860px;
      max-height: 92svh; overflow-y: auto;
      padding: 0 0 48px;
    }

    .sheet-header {
      position: sticky; top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    .sheet-title { font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .sheet-close {
      font-size: 14px; color: var(--muted);
      border: 1px solid var(--border); border-radius: 2px;
      padding: 2px 8px; cursor: pointer; background: var(--bg);
      font-family: var(--mono);
    }
    .sheet-close:hover { background: #f5f5f4; }

    .sheet-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Form ────────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .field .field-hint { font-size: 11px; color: var(--muted); }
    .field input, .field textarea, .field select {
      font-family: var(--mono); font-size: 13px;
      padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 2px;
      background: var(--bg); color: var(--text); width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--green); box-shadow: 0 0 0 2px var(--green-bg);
    }
    .field textarea { min-height: 70px; resize: vertical; }
    .field-check { display: flex; align-items: center; gap: 8px; }
    .field-check input { width: auto; }
    .field-check label { font-size: 12px; font-weight: normal; letter-spacing: 0; text-transform: none; color: var(--text); }

    /* ── Upload zone ─────────────────────────────────────────── */
    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 2px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--green); background: var(--green-bg); }
    .upload-zone p { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .upload-zone strong { font-size: 13px; }

    /* ── Photo card list ─────────────────────────────────────── */
    .photo-list { display: flex; flex-direction: column; gap: 6px; }
    .photo-card {
      border: 1px solid var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }
    .photo-card-main {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
    }
    .photo-card-reorder {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .photo-card-thumb {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      background: #f0f0ee;
      border: 1px solid var(--border-light);
      overflow: hidden;
      border-radius: 1px;
    }
    .photo-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-card-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .photo-card-caption {
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 8px;
      border: 1px solid var(--border-light);
      border-radius: 2px;
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }
    .photo-card-caption:focus { outline: none; border-color: var(--green); }
    .photo-card-id { font-size: 10px; color: var(--muted); }
    .photo-card-del {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid transparent;
      border-radius: 2px;
    }
    .photo-card-del:hover { color: var(--red); background: var(--red-bg); border-color: #d8a0a0; }

    /* Body section */
    .photo-body-section {
      border-top: 1px solid var(--border-light);
      padding: 6px 8px;
      background: #fafaf9;
    }
    .photo-body-toggle {
      font-size: 11px;
      color: var(--green);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--mono);
    }
    .photo-body-toggle:hover { text-decoration: underline; }
    .photo-body-editor { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
    .photo-body-editor textarea {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      resize: vertical;
      min-height: 80px;
      max-height: 200px;
      width: 100%;
      background: var(--bg);
    }
    .photo-body-editor textarea:focus { outline: none; border-color: var(--green); }
    .hidden { display: none !important; }

    /* ── Featured items list (settings) ─────────────────────── */
    .featured-list { display: flex; flex-direction: column; gap: 4px; }
    .featured-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px;
      border: 1px solid var(--border-light);
      border-radius: 2px;
      background: #fafaf9;
    }
    .featured-item-label { flex: 1; font-size: 12px; }
    .featured-add-row { display: flex; gap: 6px; margin-top: 6px; }
    .featured-add-row select, .featured-add-row input {
      font-family: var(--mono); font-size: 12px;
      padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 2px;
      background: var(--bg); color: var(--text);
    }
    .featured-add-row select { width: 90px; flex-shrink: 0; }
    .featured-add-row input { flex: 1; }

    /* ── Rebuild bar ─────────────────────────────────────────── */
    .rebuild-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--muted);
    }
    .rebuild-bar .status { flex: 1; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #c8a000; flex-shrink: 0; }
    .dot.idle { background: var(--green); }
    .version-tag { font-size: 10px; opacity: .45; }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--text); color: #fff;
      border: 1px solid #333;
      padding: 7px 16px; border-radius: 2px; font-size: 12px;
      opacity: 0; transition: all .2s; pointer-events: none; white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--red); border-color: var(--red); }

    /* ── Empty / loading ─────────────────────────────────────── */
    .empty { padding: 32px 0; text-align: center; color: var(--muted); font-size: 12px; border: 1px solid var(--border-light); border-top: none; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Posts list ──────────────────────────────────────────── */
    .post-card {
      border: 1px solid var(--border-light);
      border-radius: 2px;
      padding: 10px 12px;
      display: flex; align-items: baseline; gap: 10px;
    }
    .post-card-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .post-card-title { font-size: 13px; font-weight: 600; }
    .post-card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
    .post-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="site-name">Photo Admin</span>
      <div class="topbar-nav">
        <button onclick="openSettings()">Settings</button>
        <button id="btn-new" onclick="onNew()">+ New</button>
        <button id="btn-rebuild" onclick="rebuild()"><span id="rebuild-icon">↻</span> Rebuild</button>
      </div>
    </div>
    <span style="font-size:11px;color:var(--muted)" id="rebuild-label">—</span>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-series" onclick="switchTab('series')">Series</button>
    <button class="tab-btn" id="tab-btn-posts" onclick="switchTab('posts')">Posts</button>
  </div>

  <!-- Series tab -->
  <div id="tab-series">
    <div class="section-head">
      <h2>Series</h2>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:130px">Slug</th>
            <th>Title</th>
            <th style="width:70px;text-align:right">Photos</th>
            <th style="width:70px">Status</th>
            <th style="width:90px"></th>
          </tr>
        </thead>
        <tbody id="project-tbody">
          <tr><td colspan="5"><div class="empty">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Posts tab -->
  <div id="tab-posts" class="hidden">
    <div class="section-head" style="margin-bottom:12px">
      <h2>Posts</h2>
    </div>
    <div id="posts-list" style="display:flex;flex-direction:column;gap:6px">
      <div class="empty" style="border:1px solid var(--border-light)">Loading…</div>
    </div>
  </div>

</div>

<!-- Rebuild bar -->
<div class="rebuild-bar">
  <div class="dot idle" id="rebuild-dot"></div>
  <span class="status" id="rebuild-status">Site up to date</span>
  <span class="version-tag" id="version-tag"></span>
</div>

<!-- ── New series sheet ──────────────────────────────────────── -->
<div class="overlay hidden" id="overlay-new" onclick="closeIfBackdrop(event,'overlay-new')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">New Series</span>
      <button class="sheet-close" onclick="closeSheet('overlay-new')">close [esc]</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="new-title" placeholder="e.g. Iceland 2025" autocomplete="off">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="new-desc" placeholder="Short description shown on the project page…"></textarea>
      </div>
      <div>
        <button class="btn-action" onclick="createProject()">Create series →</button>
      </div>
    </div>
  </div>
</div>

<!-- ── New / Edit post sheet ─────────────────────────────────── -->
<div class="overlay hidden" id="overlay-post" onclick="closeIfBackdrop(event,'overlay-post')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title" id="post-sheet-title">New Post</span>
      <button class="sheet-close" onclick="closeSheet('overlay-post')">close [esc]</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="post-title" placeholder="Post title" autocomplete="off">
      </div>
      <div class="field">
        <label>Excerpt</label>
        <textarea id="post-excerpt" rows="2" style="min-height:50px" placeholder="Short excerpt for cards — leave blank to skip"></textarea>
      </div>
      <div class="field">
        <label>Body (markdown)</label>
        <textarea id="post-body" rows="12" style="min-height:220px" placeholder="Write your post in markdown…"></textarea>
      </div>
      <div class="field-check">
        <input type="checkbox" id="post-featured">
        <label for="post-featured">Feature on homepage</label>
      </div>
      <div class="field-check">
        <input type="checkbox" id="post-draft" checked>
        <label for="post-draft">Draft — hide from public site</label>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-action" onclick="savePost()">Save post →</button>
        <button class="btn-outline" id="post-delete-btn" onclick="deletePost()" style="display:none">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Site Settings sheet ───────────────────────────────────── -->
<div class="overlay hidden" id="overlay-settings" onclick="closeIfBackdrop(event,'overlay-settings')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title">Site Settings</span>
      <button class="sheet-close" onclick="closeSheet('overlay-settings')">close [esc]</button>
    </div>
    <div class="sheet-body">
      <div class="field"><label>Site title</label>
        <input type="text" id="set-title" placeholder="Photos"></div>
      <div class="field"><label>Nav label</label>
        <input type="text" id="set-nav" placeholder="Work"></div>
      <div class="field"><label>Photographer name (footer)</label>
        <input type="text" id="set-photographer" placeholder="Your Name"></div>
      <div class="field"><label>Site description</label>
        <textarea id="set-description" placeholder="A photo gallery"></textarea></div>

      <div style="height:1px;background:var(--border-light)"></div>

      <div class="field">
        <label>Hero photo key</label>
        <input type="text" id="set-hero-key" placeholder="series-slug/001">
        <span class="field-hint">R2 key prefix for the full-width homepage hero image. Leave blank for no hero.</span>
      </div>
      <div class="field">
        <label>Hero link (optional)</label>
        <input type="text" id="set-hero-link" placeholder="/projects/iceland-2025/">
        <span class="field-hint">Where the hero image links to. Leave blank for no link.</span>
      </div>

      <div class="field">
        <label>Featured items</label>
        <div class="featured-list" id="featured-list"></div>
        <div class="featured-add-row">
          <select id="feat-type">
            <option value="series">Series</option>
            <option value="post">Post</option>
          </select>
          <input type="text" id="feat-slug" placeholder="slug">
          <input type="text" id="feat-label" placeholder="label (optional)">
          <button class="btn-outline" onclick="addFeaturedItem()">Add</button>
        </div>
      </div>

      <div><button class="btn-action" onclick="saveSettings()">Save settings →</button></div>
    </div>
  </div>
</div>

<!-- ── Project detail sheet ──────────────────────────────────── -->
<div class="overlay hidden" id="overlay-detail" onclick="closeIfBackdrop(event,'overlay-detail')">
  <div class="sheet">
    <div class="sheet-header">
      <span class="sheet-title" id="detail-title">—</span>
      <button class="sheet-close" onclick="closeSheet('overlay-detail')">close [esc]</button>
    </div>
    <div class="sheet-body" id="detail-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────
let projects    = [];
let posts       = [];
let currentTab  = 'series';
let editingPost = null;    // null = new, string = slug being edited
let featuredItems = [];    // local state for settings panel

// ── Init ─────────────────────────────────────────────────────────
loadProjects();
setRebuildStatus('idle', 'Site up to date');
loadVersion();

async function loadVersion() {
  try {
    const v = await api('GET', '/version');
    const el = document.getElementById('version-tag');
    if (el && v.version) el.textContent = 'v' + v.version;
  } catch(_) {}
}

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-series').classList.toggle('hidden', tab !== 'series');

// ── API ──────────────────────────────────────────────────────────
async function api(method, path, body, isForm) {
  const opts = { method };
  if (body && !isForm) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
  else if (isForm) { opts.body = body; }
  const res = await fetch('/api' + path, opts);
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2800);
}

// currentPhotos is keyed by slug — we rebuild from the DOM card order
function getPhotoOrderFromDOM(slug) {
  const list = document.getElementById(`photo-list-${slug}`);
  if (!list) return [];
  return [...list.querySelectorAll('[data-photoid]')].map(el => el.dataset.photoid);

async function movePhoto(slug, id, direction) {
  // Find photos list and current order from p.photos (live in DOM via data attrs)
  const p = projects.find(x => x.slug === slug);
  if (!p) return;

  // Re-fetch current photos from API to get the latest order
  let photos;
  try { photos = await api('GET', `/projects/${slug}/photos`); }
  catch(e) { toast('Failed to fetch photos: ' + e.message, true); return; }

  const idx = photos.findIndex(f => f.id === id);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= photos.length) return;

  // Swap
  [photos[idx], photos[newIdx]] = [photos[newIdx], photos[idx]];
  const photoOrder = photos.map(f => f.id);

  try {
    await api('PATCH', `/projects/${slug}`, { photoOrder });
    setRebuildStatus('dirty', 'Rebuild needed');
    // Re-render the photo list in place
    const list = document.getElementById(`photo-list-${slug}`);
    if (list) {
      list.innerHTML = photos.map((f, i) => photoCardHTML(slug, f, i, photos.length)).join('');
    }
  } catch(e) {
    toast('Reorder failed: ' + e.message, true);
  }
}

const MAX_UPLOAD_BYTES = 30 * 1024 * 1024;
const MAX_UPLOAD_PX    = 8000;
const UPLOAD_QUALITY   = 0.92;

function resizeForUpload(file) {
  if (file.size <= MAX_UPLOAD_BYTES) return Promise.resolve(file);
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const { naturalWidth: w, naturalHeight: h } = img;
      const scale = Math.min(1, MAX_UPLOAD_PX / Math.max(w, h));
      const cw = Math.round(w * scale);
      const ch = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = ch;
      canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
      canvas.toBlob(
        (blob) => {
          if (!blob) { reject(new Error('Canvas export failed')); return; }
          resolve(new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' }));
        },
        'image/jpeg', UPLOAD_QUALITY
      );
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}

async function uploadFiles(files, slug) {
  if (!files.length) return;
  const zone = document.getElementById(`drop-${slug}`);
  const total = files.length;
  let succeeded = 0, failed = 0;

  for (let i = 0; i < total; i++) {
    const file = files[i];
    zone.innerHTML = `<strong><span class="spin">↻</span> Preparing photo ${i + 1} of ${total}…</strong>`;
    let processed;
    try { processed = await resizeForUpload(file); }
    catch(e) { failed++; toast(`Skipped ${file.name}: ${e.message}`, true); continue; }

    zone.innerHTML = `<strong><span class="spin">↻</span> Uploading ${i + 1} of ${total}…</strong>`;
    const fd = new FormData();
    fd.append('photos', processed);
    try {
      await api('POST', `/projects/${slug}/photos`, fd, true);
      succeeded++;
    } catch(e) { failed++; toast(`Failed ${file.name}: ${e.message}`, true); }
  }

  if (failed === 0) toast(`Uploaded ${succeeded} photo${succeeded !== 1 ? 's' : ''}`);
  else toast(`${succeeded} uploaded, ${failed} failed`, failed > 0);

  setRebuildStatus('dirty', 'Rebuild needed');
  const p = projects.find(x => x.slug === slug);
  const photos = await api('GET', `/projects/${slug}/photos`).catch(() => []);
  renderDetail(p, photos);
}

  const type  = document.getElementById('feat-type').value;
  const slug  = document.getElementById('feat-slug').value.trim();
  const label = document.getElementById('feat-label').value.trim();
  if (!slug) { toast('Slug is required', true); return; }
  featuredItems.push({ type, slug, label });
  document.getElementById('feat-slug').value = '';
  document.getElementById('feat-label').value = '';
  renderFeaturedList();
}

function removeFeatured(idx) {
  featuredItems.splice(idx, 1);
  renderFeaturedList();
}

function moveFeatured(idx, dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= featuredItems.length) return;
  [featuredItems[idx], featuredItems[ni]] = [featuredItems[ni], featuredItems[idx]];
  renderFeaturedList();
}

async function saveSettings() {
  const body = {
    title:        document.getElementById('set-title').value.trim(),
    navLabel:     document.getElementById('set-nav').value.trim(),
    photographer: document.getElementById('set-photographer').value.trim(),
    description:  document.getElementById('set-description').value.trim(),
    heroPhotoKey: document.getElementById('set-hero-key').value.trim(),
    heroLink:     document.getElementById('set-hero-link').value.trim(),
    featured:     featuredItems,
  };
  try {
    await api('PATCH', '/settings', body);
    closeSheet('overlay-settings');
    setRebuildStatus('dirty', 'Rebuild needed');
    toast('Settings saved — rebuild to publish');
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

// ── Sheet helpers ─────────────────────────────────────────────────
function openSheet(id) { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function closeSheet(id) { document.getElementById(id).classList.add('hidden'); document.body.style.overflow = ''; }
function closeIfBackdrop(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  ['overlay-detail','overlay-new','overlay-settings','overlay-post'].forEach(id => {
    if (!document.getElementById(id).classList.contains('hidden')) closeSheet(id);
  });
});

// ── Util ──────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
